<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de rapidité</title>
</head>

<body>

<div id="container">

    <!-- Écran d'accueil -->
    <div id="startScreen">
        <h1>🎮 Jeu de rapidité</h1>
        <button id="startBtn">Lancer le jeu</button>
    </div>

    <!-- Zone de jeu -->
    <div id="gameArea">
        <div id="timer">Temps : 60</div>
        <div id="score">Score : 0</div>
        <div id="numberDisplay">0</div>

        <div id="buttons"></div>
    </div>

    <!-- Fin -->
    <div id="endScreen">
        <h2>Fin du jeu</h2>
        <p id="finalScore"></p>
    </div>

</div>

<script src="../js/script5.js"></script>

</body>
</html>
</head>

</body>
</html>
